version: '3.8'

services:
  tblr-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tblr-api-service
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_FOLDER=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
  indexes:

